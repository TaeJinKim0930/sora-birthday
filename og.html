<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Great+Vibes&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  .og{width:1200px;height:630px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Gowun Dodum',sans-serif;
    background:
      radial-gradient(1.8px 1.8px at 18% 22%, rgba(201,162,39,.5) 50%, transparent 51%),
      radial-gradient(1.8px 1.8px at 82% 30%, rgba(201,162,39,.45) 50%, transparent 51%),
      radial-gradient(1.8px 1.8px at 66% 74%, rgba(232,92,143,.3) 50%, transparent 51%),
      radial-gradient(1.8px 1.8px at 30% 78%, rgba(201,162,39,.4) 50%, transparent 51%),
      radial-gradient(120% 90% at 50% 0%, #FBD3E1 0%, transparent 60%),
      linear-gradient(180deg,#FDE9F0 0%,#F7D5E4 55%,#EFC7DC 100%)}
  .frame{position:absolute;inset:26px;border:3px solid #D9BC6B;border-radius:8px}
  .frame::after{content:"";position:absolute;inset:7px;border:1px solid #EBD9A8;border-radius:5px}
  .fl{position:absolute;font-size:34px;color:#C9A227}
  .fl.tl{top:34px;left:40px}.fl.tr{top:34px;right:40px}.fl.bl{bottom:34px;left:40px}.fl.br{bottom:34px;right:40px}
  .crown{width:150px;height:auto;filter:drop-shadow(0 8px 12px rgba(201,162,39,.45));margin-bottom:2px}
  .eyebrow{font-size:19px;letter-spacing:.55em;text-indent:.55em;color:#B08A1E}
  .script{font-family:'Great Vibes',cursive;font-size:96px;line-height:1;color:#C94477;margin:4px 0 2px;text-shadow:0 3px 16px rgba(232,92,143,.3)}
  h1{font-family:'Song Myung',serif;font-size:60px;letter-spacing:.05em;color:#5C3A47;margin:6px 0 4px}
  h1 .g{background:linear-gradient(180deg,#F5E3A8,#C9A227 55%,#E8C766);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:24px;color:#9A6A80;letter-spacing:.08em;margin-bottom:20px}
  .chips{display:flex;gap:14px}
  .chips span{font-size:20px;color:#8A5F44;background:#FFF7E6;border:1.5px solid #EBD9A8;border-radius:999px;padding:11px 22px}
  .tw{position:absolute;color:#fff;font-size:26px;text-shadow:0 0 12px #fff}
</style>
</head>
<body>
  <div class="og">
    <div class="frame"></div>
    <span class="fl tl">❦</span><span class="fl tr">❦</span><span class="fl bl">❦</span><span class="fl br">❦</span>
    <span class="tw" style="left:20%;top:20%">✦</span><span class="tw" style="left:78%;top:24%;font-size:20px">✧</span>
    <span class="tw" style="left:70%;top:66%">✦</span><span class="tw" style="left:26%;top:70%;font-size:18px">✧</span>
    <svg class="crown" viewBox="0 0 96 62">
      <path d="M8,50 L4,20 L26,34 L48,10 L70,34 L92,20 L88,50 Z" fill="url(#gg)" stroke="#B08A1E" stroke-width="2" stroke-linejoin="round"/>
      <rect x="8" y="50" width="80" height="8" rx="3" fill="url(#gg)" stroke="#B08A1E" stroke-width="1.6"/>
      <circle cx="48" cy="8" r="4.5" fill="#F08CAD" stroke="#C94477" stroke-width="1.4"/>
      <circle cx="4.5" cy="18" r="3.4" fill="#C9B8E8" stroke="#9B85C9" stroke-width="1.2"/>
      <circle cx="91.5" cy="18" r="3.4" fill="#C9B8E8" stroke="#9B85C9" stroke-width="1.2"/>
      <circle cx="30" cy="54" r="2.6" fill="#F08CAD"/><circle cx="48" cy="54" r="2.6" fill="#fff"/><circle cx="66" cy="54" r="2.6" fill="#F08CAD"/>
      <defs><linearGradient id="gg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F5E3A8"/><stop offset=".55" stop-color="#D9AC33"/><stop offset="1" stop-color="#EBCB6F"/></linearGradient></defs>
    </svg>
    <div class="eyebrow">ROYAL INVITATION</div>
    <div class="script">Princess Sora</div>
    <h1><span class="g">소라 공주</span> 생일 연회</h1>
    <div class="sub">— 1박 2일 · 양양 어전 바베큐 —</div>
    <div class="chips"><span>👑 2026. 8. 1 ~ 8. 2</span><span>📜 인장을 눌러 칙령을 펼치시오</span></div>
  </div>
</body>
</html>
